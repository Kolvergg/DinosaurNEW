<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta charset="UTF-8">
<!-- These three lines are what let iOS hide the URL bar / share / refresh
     chrome when added to the Home Screen. They only take effect the NEXT
     time the icon is added — see chat for why you need to re-add it. -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Landing Page</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background-color: #eef2f3;
        overflow: hidden;
        position: fixed;
        width: 100%;
        height: 100%;
        overscroll-behavior: none;
    }
    html {
        height: 100%;
        overflow: hidden;
    }
    html, body {
        touch-action: none;
    }
    .image-container {
        width: 100%;
        height: 100vh;
        height: 100dvh; /* iOS-accurate viewport height where supported */
        position: relative;
        display: block;
        overflow: hidden;
    }
    .image-container img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
    }
    .invisible-button {
        position: absolute;
        bottom: 11.3%;
        left: 6%;
        width: 88%;
        height: 12%;
        cursor: pointer;
        z-index: 10;
        text-decoration: none;
    }
</style>
</head>
<body>
    <div class="image-container">
        <img src="idjameshp.png" alt="">
        <a href="main.html" class="invisible-button" data-transition="slide-left"></a>
    </div>
    <script>
        document.querySelector('a[data-transition="slide-left"]').addEventListener('click', function (e) {
            e.preventDefault();
            var target = this.getAttribute('href');
            document.body.style.transition = 'transform 0.5s ease';
            document.body.style.transform = 'translateX(-100vw)';
            setTimeout(function () { window.location.href = target; }, 500);
        });
    </script>
    <script>
        document.addEventListener('gesturestart', function (e) { e.preventDefault(); });
        document.addEventListener('gesturechange', function (e) { e.preventDefault(); });
        document.addEventListener('gestureend', function (e) { e.preventDefault(); });
    </script>
</body>
</html>
